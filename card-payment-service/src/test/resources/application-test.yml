spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=10000
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

# @FeignClient(url = ${bank.service.url}) 플레이스홀더 해소용 (테스트에선 BankClient를 @MockBean으로 대체)
bank:
  service:
    url: http://localhost:8080

logging:
  level:
    com.card.payment: INFO
